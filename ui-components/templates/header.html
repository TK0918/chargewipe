<!-- 顶部栏 -->
<header class="bg-white shadow-sm border-b border-gray-200">
  <div class="flex items-center justify-between h-16 px-4 sm:px-6 lg:px-8">
    <!-- 左侧 -->
    <div class="flex items-center">
      <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-md text-gray-400 hover:text-gray-500 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-orange-500">
        <i class="fas fa-bars text-lg"></i>
      </button>
      
      <div class="ml-4 lg:ml-0">
        <nav class="flex space-x-2 text-sm" aria-label="Breadcrumb">
          <span class="text-gray-500">模块名称</span>
          <i class="fas fa-chevron-right text-gray-300 text-xs mt-0.5"></i>
          <span class="text-gray-900 font-medium">页面名称</span>
        </nav>
      </div>
    </div>
    
    <!-- 右侧 -->
    <div class="flex items-center space-x-4">
      <div class="relative">
        <button class="p-2 text-gray-400 hover:text-gray-500 relative">
          <i class="fas fa-bell text-lg"></i>
          <span class="absolute -top-1 -right-1 h-4 w-4 bg-red-500 rounded-full flex items-center justify-center text-xs text-white">0</span>
        </button>
      </div>
      
      <div class="flex items-center space-x-3">
        <div class="w-8 h-8 bg-gradient-to-r from-orange-300 to-orange-500 rounded-full flex items-center justify-center">
          <span class="text-white text-sm font-medium">A</span>
        </div>
        <span class="hidden md:block text-sm font-medium text-gray-700">用户名</span>
      </div>
    </div>
  </div>
</header>
